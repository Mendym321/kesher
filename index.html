<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kesher</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#3b82f6;--blue-d:#2563eb;--blue-l:#eff6ff;--font:'Nunito',-apple-system,sans-serif;}
body{font-family:var(--font);background:#f9fafb;color:#111827;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.card{background:#fff;border-radius:24px;border:1px solid #e5e7eb;box-shadow:0 4px 24px rgba(0,0,0,.06);width:100%;max-width:400px;padding:36px 32px 32px;animation:up .4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;}
.mark{width:34px;height:34px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;}
.logo-name{font-size:18px;font-weight:800;color:#111827;}
.logo-heb{font-size:11px;color:#9ca3af;font-weight:500;}

h1{font-size:22px;font-weight:800;color:#111827;margin-bottom:6px;}
.sub{font-size:14px;color:#6b7280;margin-bottom:28px;line-height:1.55;}

.who-label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.wc{padding:16px 14px;border:2px solid #e5e7eb;border-radius:14px;cursor:pointer;transition:all .16s;background:#fff;text-align:left;}
.wc:hover{border-color:#bfdbfe;background:#eff6ff;}
.wc.on{border-color:var(--blue);background:#eff6ff;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.wc-av{width:32px;height:32px;border-radius:50%;background:#e5e7eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#6b7280;margin-bottom:8px;}
.wc.on .wc-av{background:var(--blue);color:#fff;}
.wc-name{font-size:13.5px;font-weight:700;color:#111827;}
.wc-role{font-size:12px;color:#9ca3af;}

.enter{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:14px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:8px;}
.enter:hover{background:var(--blue-d);}
.enter:active{transform:scale(.98);}
.enter svg{width:15px;height:15px;transition:transform .16s;}
.enter:hover svg{transform:translateX(3px);}

.note{margin-top:16px;font-size:11.5px;color:#9ca3af;text-align:center;line-height:1.6;}
.ver{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:#d1d5db;}
.vdot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:p 2s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:480px){
  body{padding:0;align-items:flex-end;background:transparent;}
  .card{border-radius:24px 24px 0 0;border-bottom:none;max-width:100%;padding:32px 22px 40px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="mark">K</div>
    <div><div class="logo-name">Kesher</div><div class="logo-heb">קֶשֶׁר · Connection</div></div>
  </div>

  <h1>Welcome back.</h1>
  <p class="sub">Your community relationship tool.<br>Who's logging in today?</p>

  <div class="who-label">Log in as</div>
  <div class="who-grid">
    <div class="wc on" id="wc-r" onclick="setWho('rabbi')">
      <div class="wc-av" id="av-r">ל</div>
      <div class="wc-name">Rabbi Levi</div>
      <div class="wc-role">Goldstein</div>
    </div>
    <div class="wc" id="wc-rb" onclick="setWho('rebbet')">
      <div class="wc-av" id="av-rb">ש</div>
      <div class="wc-name">Rebbetzin</div>
      <div class="wc-role">Sarah Goldstein</div>
    </div>
  </div>

  <button class="enter" onclick="go()">
    Open Kesher
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>

  <div class="note">All data stays on your device.<br>No account needed.</div>
  <div class="ver"><div class="vdot"></div>v1.0 · Chabad of Riverside</div>
</div>

<script>
let who='rabbi';
function setWho(w){
  who=w;
  document.getElementById('wc-r').classList.toggle('on',w==='rabbi');
  document.getElementById('wc-rb').classList.toggle('on',w==='rebbet');
}
function go(){
  localStorage.setItem('k_who',who);
  const btn=document.querySelector('.enter');
  btn.textContent='Opening…';btn.style.opacity='.7';btn.style.pointerEvents='none';
  setTimeout(()=>window.location.href='kesher.html',280);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter')go();
  if(e.key==='Tab'){e.preventDefault();setWho(who==='rabbi'?'rebbet':'rabbi');}
});
</script>
</body>
</html>
